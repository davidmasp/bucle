name: Bucle task
description: Create a bucle task issue that can be imported with `bucle sync`.
title: "bucle-task-{{DATE}}"
labels:
  - bucle
body:
  - type: textarea
    id: bucle-metadata
    attributes:
      label: Bucle sync metadata
      description: Keep this YAML block at the beginning of the issue body so `bucle sync` can parse task variables.
      value: |
        ```yaml
        cwd: ""
        agent: opencode
        ```
    validations:
      required: true
  - type: textarea
    id: task-prompt
    attributes:
      label: Task prompt
      description: Describe what the agent should do.
      placeholder: Describe the task for `bucle` to run.
    validations:
      required: true
